<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Сервера Minecraft</title>
<style>
    /* Прозрачный фон страницы */
    body {
        background-color: transparent; /* фон прозрачный */
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        color: white;
    }

    /* Панорама как фон через абсолютный элемент */
    #panorama {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* позади всего */
        background: url('res/lenta.png') no-repeat center center;
        background-size: cover;
        animation: scrollBackground 30s linear infinite;
    }

    @keyframes scrollBackground {
        0% { background-position: 0 0; }
        100% { background-position: -4608px 0; } /* длина вашей панорамы */
    }

    /* Блок сервера */
    .server {
        display: flex;
        align-items: center;
        background-color: rgba(0,0,0,0.5); /* полупрозрачный фон для читаемости */
        padding: 15px;
        margin: 10px auto;
        border-radius: 10px;
        width: 600px;
    }

    .server img {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        margin-right: 15px;
    }

    .server-info {
        display: flex;
        flex-direction: column;
    }

    .server__name {
        font-size: 18px;
        color: #00ff00;
        font-weight: bold;
    }

    .server__players,
    .server__address,
    .server__description {
        font-size: 14px;
        color: #ccc;
    }

    .server__description a {
        color: #00ffff; /* ярко-голубая ссылка */
        text-decoration: none;
    }
    .server__description a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div id="panorama"></div>

<div class="server">
    <img src="https://api.betacraft.uk/v2/server_icon?socket=37.59.98.229:25565" alt="Server Icon">
    <div class="server-info">
        <span class="server__name">[a1.1.2_01] PlanetNostalgia - Alpha 1.1.2_01 Economy Survival Server</span>
        <span class="server__players">(0 / 36)</span>
        <span class="server__address">37.59.98.229:25565</span>
        <span class="server__description">
            Minecraft Alpha 1.1.2_01 Economy Survival Server. 
            Join our Discord - 
            <a href="https://discord.gg/tUaEPHAtQp" target="_blank">discord.gg/tUaEPHAtQp</a>. 
            Plugins: hModEssentials, iConomy, Towny, LWC, Spleef, LogBlock, BigBrother &amp; more!
        </span>
    </div>
</div>

</body>
</html>
